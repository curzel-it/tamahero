<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TamaHero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { max-width: 600px; padding: 2rem; }
        h1 { font-size: 3rem; margin-bottom: 1rem; color: #fff; }
        p { font-size: 1.2rem; line-height: 1.6; color: #aaa; }
        .subtitle { margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TamaHero</h1>
        <p class="subtitle">Your pixel hero awaits.</p>
        <p>Available on Android, iOS, and Desktop.</p>
    </div>
</body>
</html>
